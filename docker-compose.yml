version: '3.8'

services:
  lootdrop-cn:
    build: .
    container_name: lootdrop-cn
    expose:
      - "8090"
    environment:
      - PORT=8090
    volumes:
      - ./data.db:/app/data.db
      - ./reports:/app/reports
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/api/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  updater:
    build: .
    container_name: lootdrop-cn-updater
    environment:
      - INTERVAL_SECONDS=21600
    command: ["/bin/sh", "/app/scripts/sync_loop.sh"]
    volumes:
      - ./data.db:/app/data.db
      - ./reports:/app/reports
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      lootdrop-cn:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: lootdrop-cn-nginx
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      lootdrop-cn:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
