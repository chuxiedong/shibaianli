limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
map $http_user_agent $is_bad_ua {
    default 0;
    ~*(sqlmap|nikto|masscan|nmap|acunetix|dirbuster|gobuster|wpscan|nessus|zgrab) 1;
}
map $request_uri $is_bad_path {
    default 0;
    ~*(/wp-admin|/wp-login\.php|/xmlrpc\.php|/phpmyadmin|/\.env|/vendor/phpunit|/cgi-bin|/actuator|/manager/html) 1;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;
    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' data: blob:; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self';" always;

    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
    }

    if ($is_bad_ua) { return 403; }
    if ($is_bad_path) { return 404; }

    location / {
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) { return 405; }
        limit_conn conn_limit 20;
        proxy_pass http://lootdrop-cn:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /assets/ {
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) { return 405; }
        proxy_pass http://lootdrop-cn:8090/assets/;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location /api/ {
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) { return 405; }
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://lootdrop-cn:8090/api/;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store";
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
